name: Build Helium Passwords

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        type: choice
        default: all
        options:
          - all
          - linux
          - macos
          - windows
      arch:
        description: Architecture to build
        required: true
        type: choice
        default: all
        options:
          - all
          - x86_64
          - arm64
      platform-ref:
        description: Branch or tag to clone from platform repos
        required: false
        type: string
        default: main

concurrency:
  group: helium-passwords-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }} ${{ matrix.arch }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runner: ubuntu-24.04
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: macos
            arch: x86_64
            runner: macos-15-intel
          - platform: macos
            arch: arm64
            runner: macos-15
          - platform: windows
            arch: x86_64
            runner: windows-2025
          - platform: windows
            arch: arm64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    env:
      HELIUM_PLATFORM_REF: ${{ github.event_name == 'workflow_dispatch' && inputs['platform-ref'] || 'main' }}
      TARGET_SELECTED: >-
        ${{
          github.event_name != 'workflow_dispatch' ||
          ((inputs.platform == 'all' || inputs.platform == matrix.platform) &&
           (inputs.arch == 'all' || inputs.arch == matrix.arch))
        }}
    steps:
      - name: Skip unselected target
        if: env.TARGET_SELECTED != 'true'
        run: echo "Skipping ${{ matrix.platform }} ${{ matrix.arch }}"

      - name: Checkout
        if: env.TARGET_SELECTED == 'true'
        uses: actions/checkout@v6

      - name: Verify build target
        if: env.TARGET_SELECTED == 'true'
        shell: bash
        run: bash scripts/ci-check-target.sh "${{ matrix.platform }}" "${{ matrix.arch }}"
