name: Build Helium Passwords

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        type: choice
        default: all
        options:
          - all
          - linux
          - macos
          - windows
      arch:
        description: Architecture to build
        required: true
        type: choice
        default: all
        options:
          - all
          - x86_64
          - arm64
      platform-ref:
        description: Branch or tag to clone from platform repos
        required: false
        type: string
        default: main
      run-build:
        description: Run the selected full platform build after target checks
        required: true
        type: boolean
        default: false
      create-release:
        description: Create a prerelease from the selected full-build artifacts
        required: true
        type: boolean
        default: false
      release-tag:
        description: Optional release tag; defaults to the built Helium version
        required: false
        type: string
        default: ""

concurrency:
  group: helium-passwords-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }} ${{ matrix.arch }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runner: ubuntu-24.04
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: macos
            arch: x86_64
            runner: macos-15-intel
          - platform: macos
            arch: arm64
            runner: macos-15
          - platform: windows
            arch: x86_64
            runner: windows-2025
          - platform: windows
            arch: arm64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    env:
      HELIUM_PLATFORM_REF: ${{ github.event_name == 'workflow_dispatch' && inputs['platform-ref'] || 'main' }}
      TARGET_SELECTED: >-
        ${{
          github.event_name != 'workflow_dispatch' ||
          ((inputs.platform == 'all' || inputs.platform == matrix.platform) &&
           (inputs.arch == 'all' || inputs.arch == matrix.arch))
        }}
      RUN_FULL_BUILD: >-
        ${{
          github.event_name == 'workflow_dispatch' &&
          (inputs['run-build'] == true || inputs['create-release'] == true)
        }}
    steps:
      - name: Skip unselected target
        if: env.TARGET_SELECTED != 'true'
        run: echo "Skipping ${{ matrix.platform }} ${{ matrix.arch }}"

      - name: Checkout
        if: env.TARGET_SELECTED == 'true'
        uses: actions/checkout@v6

      - name: Verify build target
        if: env.TARGET_SELECTED == 'true'
        shell: bash
        run: bash scripts/ci-check-target.sh "${{ matrix.platform }}" "${{ matrix.arch }}"

      - name: Run full platform build
        if: env.TARGET_SELECTED == 'true' && env.RUN_FULL_BUILD == 'true'
        shell: bash
        run: bash scripts/build.sh "${{ matrix.platform }}" "${{ matrix.arch }}"

      - name: Collect packaged artifacts
        if: env.TARGET_SELECTED == 'true' && env.RUN_FULL_BUILD == 'true'
        shell: bash
        run: |
          bash scripts/collect-artifacts.sh \
            "${{ matrix.platform }}" \
            "${{ matrix.arch }}" \
            "${GITHUB_WORKSPACE}/build/platforms/${{ matrix.platform }}" \
            "${GITHUB_WORKSPACE}/build/artifacts/${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Upload packaged artifacts
        if: env.TARGET_SELECTED == 'true' && env.RUN_FULL_BUILD == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: helium-passwords-${{ matrix.platform }}-${{ matrix.arch }}
          path: build/artifacts/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create release
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs['create-release'] == true && !cancelled() && !failure() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: helium-passwords-*
          path: release-artifacts

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG_INPUT: ${{ inputs['release-tag'] }}
          HELIUM_PLATFORM_REF: ${{ inputs['platform-ref'] }}
        run: |
          mapfile -t versions < <(find release-artifacts -name version.txt -type f -exec cat {} \; | sort -u)
          if [ "${#versions[@]}" -ne 1 ] && [ -z "${RELEASE_TAG_INPUT}" ]; then
            printf 'expected one built version, found %s\n' "${#versions[@]}" >&2
            printf '%s\n' "${versions[@]}" >&2
            exit 1
          fi

          release_tag="${RELEASE_TAG_INPUT:-${versions[0]}}"
          mapfile -t assets < <(
            find release-artifacts -type f \
              ! -name version.txt \
              ! -name manifest.env \
              | sort
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi

          {
            printf '# Helium Passwords %s\n\n' "${release_tag}"
            printf -- '- Source commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- Platform ref: `%s`\n' "${HELIUM_PLATFORM_REF}"
            printf -- '- Workflow run: %s/%s/actions/runs/%s\n\n' \
              "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}"
            printf 'Artifacts:\n'
            for asset in "${assets[@]}"; do
              printf -- '- `%s`\n' "$(basename "${asset}")"
            done
          } > release-notes.md

          gh release create "${release_tag}" "${assets[@]}" \
            --target "${GITHUB_SHA}" \
            --title "${release_tag}" \
            --prerelease \
            --notes-file release-notes.md
